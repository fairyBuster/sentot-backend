{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 480px;">
  <h1 class="page-title">Modify {{ field|title }}</h1>
  <p>User: <strong>{{ user_obj.phone }}</strong></p>
  <p>Current value: <strong>{{ current_value }}</strong></p>

  <form method="post" style="margin-top: 16px;">
    {% csrf_token %}
    <div class="form-row">
      <label for="id_amount">Amount</label>
      <input type="number" step="0.01" name="amount" id="id_amount" class="vTextField" required>
    </div>
    <div class="form-row" style="margin-top: 12px;">
      <label>Action</label>
      <div>
        <label style="margin-right: 16px;"><input type="radio" name="action" value="increase" checked> Increase</label>
        <label><input type="radio" name="action" value="decrease"> Decrease</label>
      </div>
    </div>
    <div class="submit-row" style="margin-top: 16px;">
      <input type="submit" value="Submit" class="default">
      <a href="{% url 'admin:accounts_user_change' user_obj.id %}" class="button" style="margin-left: 8px;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
