version: "3.8"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentot-backend
    env_file:
      - .env
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
      - staticfiles:/app/staticfiles
    depends_on:
      - db
    command: >
      sh -c "gunicorn config.wsgi:application
      --bind 0.0.0.0:$${PORT:-8000}
      --workers $${WORKERS:-3}
      --worker-class gthread
      --threads $${THREADS:-2}
      --timeout $${TIMEOUT:-120}
      --keep-alive $${KEEP_ALIVE:-65}
      --max-requests $${MAX_REQUESTS:-1000}
      --max-requests-jitter $${MAX_REQUESTS_JITTER:-50}
      --preload
      --access-logfile $${ACCESS_LOGFILE:--}
      --error-logfile $${ERROR_LOGFILE:--}
      --log-level $${LOG_LEVEL:-info}"
    restart: unless-stopped
  caddy:
    image: caddy:2-alpine
    container_name: sentot-caddy
    depends_on:
      - web
    env_file:
      - .env
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - media:/app/media:ro
      - staticfiles:/app/staticfiles:ro
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    container_name: sentot-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backup.sql:/docker-entrypoint-initdb.d/00-backup.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
volumes:
  media:
  staticfiles:
  caddy_data:
  caddy_config:
  pgdata:
