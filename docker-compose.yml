services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8000"
    volumes:
      - .:/app
      - media:/app/media
      - staticfiles:/app/staticfiles
    environment:
      - DEBUG=0
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=6432
      - DB_CONN_MAX_AGE=0
      - WORKERS=3
      - THREADS=2
      - TIMEOUT=120
      - KEEP_ALIVE=65
      - MAX_REQUESTS=1000
      - MAX_REQUESTS_JITTER=50
      - LOG_LEVEL=info
    depends_on:
      - pgbouncer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DATABASE_USER}
      - DB_PASSWORD=${DATABASE_PASSWORD}
      - DB_NAME=${DATABASE_NAME}
      - LISTEN_PORT=6432
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
    depends_on:
      - db
    restart: unless-stopped
  
  caddy:
    image: caddy:2-alpine
    env_file:
      - .env
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - CORS_ORIGIN_REGEX=${CORS_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1)(:\d+)?$}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/app:ro
      - media:/app/media:ro
      - staticfiles:/app/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  media:
  staticfiles:
