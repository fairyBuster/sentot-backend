{
        auto_https off

        servers {
                trusted_proxies static 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22 2400:cb00::/32 2606:4700::/32 2803:f800::/32 2405:b500::/32 2405:8100::/32 2a06:98c0::/29 2c0f:f248::/32
        }

        log {
                output file /var/log/caddy/access.log {
                        roll_size 100mb
                        roll_keep 5
                        roll_keep_for 720h
                }
                format json
                level info
        }
}

(site_common) {
        header X-Content-Type-Options "nosniff"
        header X-Frame-Options "DENY"
        header X-XSS-Protection "1; mode=block"
        header Referrer-Policy "strict-origin-when-cross-origin"
        header -Server

        @frontend_only client_ip 176.97.64.112

        handle /health {
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        handle_path /static/* {
                root * /root/sentot-backend/staticfiles
                header Cache-Control "public, max-age=2592000"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server
        }

        handle_path /media/* {
                root * /root/sentot-backend/media
                header Cache-Control "public, max-age=2592000"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server
        }

        route /api/* {
                handle @frontend_only {
                @options_api {
                        method OPTIONS
                }
                @origin_asfinofficial {
                        header Origin https://asfinofficial.com
                }
                @origin_asfiiofficial {
                        header Origin https://asfiiofficial.com
                }
                @origin_asfnaofficial {
                        header Origin https://asfnaofficial.com
                }
                @origin_asfnofficial {
                        header Origin https://asfnofficial.com
                }

                handle @options_api {
                        header {
                                Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
                                Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
                                Access-Control-Allow-Credentials "true"
                                Access-Control-Max-Age "86400"
                                Content-Length "0"
                        }
                        header @origin_asfinofficial Access-Control-Allow-Origin https://asfinofficial.com
                        header @origin_asfiiofficial Access-Control-Allow-Origin https://asfiiofficial.com
                        header @origin_asfnaofficial Access-Control-Allow-Origin https://asfnaofficial.com
                        header @origin_asfnofficial Access-Control-Allow-Origin https://asfnofficial.com
                        respond "" 204
                }

                handle {
                        header @origin_asfinofficial Access-Control-Allow-Origin https://asfinofficial.com
                        header @origin_asfiiofficial Access-Control-Allow-Origin https://asfiiofficial.com
                        header @origin_asfnaofficial Access-Control-Allow-Origin https://asfnaofficial.com
                        header @origin_asfnofficial Access-Control-Allow-Origin https://asfnofficial.com
                        reverse_proxy 127.0.0.1:8000 {
                                header_up Host {host}
                                header_up X-Forwarded-Proto https
                                header_up X-Real-IP {remote_ip}
                                header_up X-Forwarded-For {remote_ip}
                                header_up X-Request-ID {http.request.id}
                        }

                        encode gzip zstd
                }
                }
                respond "Forbidden" 403
        }

        handle {
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                        header_up X-Request-ID {http.request.id}
                }

                encode gzip zstd
        }
}

croucloud.xyz www.croucloud.xyz {
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        log {
                output file /var/log/caddy/croucloud.xyz.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        import site_common
}


:443 {
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        @denied_except_static {
                not remote_ip 38.180.249.134 38.47.176.115
                not path /static/* /media/* /health
        }
# respond @denied_except_static "Access Denied" 403

        log {
                output file /var/log/caddy/ip_access.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        import site_common
}
