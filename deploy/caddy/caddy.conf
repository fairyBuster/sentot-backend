{
        auto_https off

        log {
                output file /var/log/caddy/access.log {
                        roll_size 100mb
                        roll_keep 5
                        roll_keep_for 720h
                }
                format json
                level info
        }
}

(site_common) {
        header X-Content-Type-Options "nosniff"
        header X-Frame-Options "DENY"
        header X-XSS-Protection "1; mode=block"
        header Referrer-Policy "strict-origin-when-cross-origin"
        header -Server

        handle /health {
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        handle_path /static/* {
                root * /root/Ocerinbackend/staticfiles
                header Cache-Control "public, max-age=2592000"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server {
                        browse off
                }
        }

        handle_path /media/* {
                root * /root/Ocerinbackend/media
                header Cache-Control "public, max-age=2592000"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server {
                        browse off
                }
        }

        route /api/* {
                @options_api {
                        method OPTIONS
                }

                handle @options_api {
                        header {
                                Access-Control-Allow-Origin https://ocrn2000.com
                                Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
                                Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
                                Access-Control-Allow-Credentials "true"
                                Access-Control-Max-Age "86400"
                                Content-Length "0"
                        }
                        respond "" 204
                }

                handle {
                        reverse_proxy 127.0.0.1:8000 {
                                header_up Host {host}
                                header_up X-Forwarded-Proto https
                                header_up X-Real-IP {remote_ip}
                                header_up X-Forwarded-For {remote_ip}
                                header_up X-Request-ID {http.request.id}
                        }

                        encode gzip zstd
                }
        }

        handle {
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                        header_up X-Request-ID {http.request.id}
                }

                encode gzip zstd
        }
}

backendocer.shop www.backendocer.shop {
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        log {
                output file /var/log/caddy/backendocer.shop.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        import site_common
}

:443 {
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        @denied {
                not remote_ip 38.180.249.134 38.47.176.115
        }
        respond @denied "Access Denied" 403

        log {
                output file /var/log/caddy/ip_access.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        import site_common
}