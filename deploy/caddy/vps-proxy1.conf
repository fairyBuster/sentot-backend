# ========================================================
# CADDY PROXY CONFIGURATION - AUTOMATIC HTTPS (FIXED 525)
# VPS Proxy (15.235.197.134) -> Backend (38.180.106.199)
#
# Error 525 (SSL Handshake Failed) terjadi jika:
# 1. Cloudflare mencoba menghubungi Origin (Caddy) via HTTPS.
# 2. Tapi Caddy belum punya sertifikat valid untuk domain tersebut.
# 3. Atau SNI mismatch.
#
# SOLUSI:
# Kita gunakan 'tls internal' jika di backend belum ada sertifikat publik,
# atau biarkan Caddy mengelola sertifikat Let's Encrypt secara otomatis.
#
# Jika masih Error 525, kemungkinan besar Cloudflare Mode = Full (Strict).
# Coba ubah ke 'Full' biasa dulu, atau gunakan sertifikat Origin CA.
# ========================================================

(common_config) {
        # Mengaktifkan kompresi
        encode gzip zstd

        # ==========================================================
        # LOGGING
        # Mencatat semua request dalam format JSON yang terstruktur
        # ==========================================================
        log {
                output file /var/log/caddy/access.log {
                        roll_size 100mb
                        roll_keep 10
                        roll_keep_for 720h
                }
                format json
                level info
        }

        # Health Check Endpoint untuk Cloudflare Failover
        # Cloudflare akan melakukan ping ke /health setiap X detik.
        # Jika VPS Proxy ini mati (Caddy down), Cloudflare akan pindah ke VPS 2.
        handle /health {
                header Content-Type "application/json"
                respond "{\"status\": \"ok\", \"proxy\": \"vps-1\"}" 200
        }

        # Security Headers Dasar
        header {
                Strict-Transport-Security "max-age=31536000;"
                X-Content-Type-Options "nosniff"
                X-Frame-Options "DENY"
                X-XSS-Protection "1; mode=block"
                Referrer-Policy "strict-origin-when-cross-origin"
                -Server
        }

        # Reverse Proxy ke Backend (HTTP - Port 80)
        # Kita arahkan ke PORT 80 (HTTP) agar tidak perlu SSL Handshake ke backend.
        # Komunikasi antar VPS (Proxy -> Backend) aman jika lewat private network atau whitelist IP.
        reverse_proxy 38.180.106.199:80 {
                # Meneruskan Host asli
                header_up Host {host}
                header_up X-Real-IP {remote_host}
                header_up X-Forwarded-For {remote_host}
                header_up X-Forwarded-Proto {scheme}

                # Transport HTTP (Bukan HTTPS, jadi tidak ada SSL Handshake ke backend)
                transport http {
                        keepalive 5s
                }
        }
}

# ========================================================
# DOMAIN LIST
# ========================================================

# 1. asfinofficial.com
asfinofficial.com, www.asfinofficial.com {
        tls /etc/caddy/certs/asfinofficial.com.pem /etc/caddy/certs/asfinofficial.com.key
        import common_config

        # Opsi: Jika sertifikat Let's Encrypt gagal (misal karena limit),
        # bisa coba pakai ZeroSSL atau 'tls internal' sementara.
        # tls internal 
}

# 2. asfiiofficial.com
asfiiofficial.com, www.asfiiofficial.com {
        tls /etc/caddy/certs/asfiiofficial.com.pem /etc/caddy/certs/asfiiofficial.com.key
        import common_config
}

# 3. asfnaofficial.com
asfnaofficial.com, www.asfnaofficial.com {
        tls /etc/caddy/certs/asfnaofficial.com.pem /etc/caddy/certs/asfnaofficial.com.key
        import common_config
}

# 4. asfnofficial.com
asfnofficial.com, www.asfnofficial.com {
        tls /etc/caddy/certs/asfnofficial.com.pem /etc/caddy/certs/asfnofficial.com.key
        import common_config
}

:80 {
        @health path /health /health/*
        handle @health {
                header Content-Type "application/json"
                respond "{\"status\": \"ok\", \"proxy\": \"vps-2\"}" 200
        }
        handle {
                redir https://{host}{uri} 308
        }
}