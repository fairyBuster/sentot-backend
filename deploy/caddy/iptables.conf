#!/bin/bash
# ========================================================
# IPTables Configuration - Cloudflare Only
# Security: Only allow CF IPs to access web, SSH open for management
# ========================================================

echo "Starting IPTables configuration..."
echo "WARNING: Ensure you have SSH console access if connection drops!"

# ========================================================
# BACKUP CONFIG (PENTING!)
# ========================================================
sudo iptables-save > ~/iptables-backup-$(date +%Y%m%d-%H%M%S).txt
echo "✓ Backup created in home directory"

# ========================================================
# RESET POLICIES (Optional - uncomment if needed)
# ========================================================
# sudo iptables -P INPUT ACCEPT
# sudo iptables -P FORWARD ACCEPT
# sudo iptables -P OUTPUT ACCEPT
# sudo iptables -F
# sudo iptables -X

# ========================================================
# DEFAULT POLICIES
# ========================================================
sudo iptables -P INPUT DROP
sudo iptables -P FORWARD DROP
sudo iptables -P OUTPUT ACCEPT

echo "✓ Default policies set: INPUT DROP, FORWARD DROP, OUTPUT ACCEPT"

# ========================================================
# ALLOW LOOPBACK
# ========================================================
sudo iptables -A INPUT -i lo -j ACCEPT
echo "✓ Loopback interface allowed"

# ========================================================
# ALLOW ESTABLISHED/RELATED CONNECTIONS
# ========================================================
sudo iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
echo "✓ Established/Related connections allowed"

# ========================================================
# SSH - ALLOW FROM ANY IP (for management)
# ========================================================
sudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT
sudo iptables -A INPUT -p tcp --dport 2222 -j ACCEPT
echo "✓ SSH (22, 2222) allowed from any IP"

# ========================================================
# CLOUDFLARE IPv4 RANGES - Allow HTTP/HTTPS
# ========================================================
echo "Adding Cloudflare IPv4 ranges for HTTP/HTTPS..."

CLOUDFLARE_IPS=(
    "103.21.244.0/22"
    "103.22.200.0/22"
    "103.31.4.0/22"
    "104.16.0.0/13"
    "104.24.0.0/14"
    "108.162.192.0/18"
    "131.0.72.0/22"
    "141.101.64.0/18"
    "162.158.0.0/15"
    "172.64.0.0/13"
    "173.245.48.0/20"
    "188.114.96.0/20"
    "190.93.240.0/20"
    "197.234.240.0/22"
    "198.41.128.0/17"
)

for ip in "${CLOUDFLARE_IPS[@]}"; do
    sudo iptables -A INPUT -p tcp --dport 80 -s "$ip" -j ACCEPT
    sudo iptables -A INPUT -p tcp --dport 443 -s "$ip" -j ACCEPT
done

echo "✓ Cloudflare IPv4 ranges allowed for HTTP/HTTPS"

# ========================================================
# CLOUDFLARE IPv6 RANGES - Allow HTTP/HTTPS
# ========================================================
echo "Adding Cloudflare IPv6 ranges for HTTP/HTTPS..."

CLOUDFLARE_IPV6=(
    "2400:cb00::/32"
    "2606:4700::/32"
    "2803:f800::/32"
    "2405:b500::/32"
    "2405:8100::/32"
    "2c0f:f248::/32"
    "2a06:98c0::/29"
)

for ip in "${CLOUDFLARE_IPV6[@]}"; do
    sudo ip6tables -A INPUT -p tcp --dport 80 -s "$ip" -j ACCEPT
    sudo ip6tables -A INPUT -p tcp --dport 443 -s "$ip" -j ACCEPT
done

echo "✓ Cloudflare IPv6 ranges allowed for HTTP/HTTPS"

# ========================================================
# BLOCK ALL OTHER HTTP/HTTPS ACCESS
# ========================================================
sudo iptables -A INPUT -p tcp --dport 80 -j DROP
sudo iptables -A INPUT -p tcp --dport 443 -j DROP
sudo ip6tables -A INPUT -p tcp --dport 80 -j DROP
sudo ip6tables -A INPUT -p tcp --dport 443 -j DROP

echo "✓ All non-Cloudflare HTTP/HTTPS access BLOCKED"

# ========================================================
# OPTIONAL: Block direct IP access (DNS resolution)
# ========================================================
# If you want to block access by direct IP, uncomment below
# Note: This blocks even from Cloudflare if accessed by IP directly
# sudo iptables -A INPUT -p tcp --dport 80 -d <YOUR_SERVER_IP> -j DROP
# sudo iptables -A INPUT -p tcp --dport 443 -d <YOUR_SERVER_IP> -j DROP

# ========================================================
# ICMP (Ping) - Optional allow for diagnostics
# ========================================================
sudo iptables -A INPUT -p icmp --icmp-type echo-request -j ACCEPT
sudo ip6tables -A INPUT -p icmpv6 --icmpv6-type echo-request -j ACCEPT

echo "✓ ICMP ping allowed"

# ========================================================
# LOG DROPPED PACKETS (Optional - for debugging)
# ========================================================
# Uncomment if you want to see dropped packets in syslog
# sudo iptables -A INPUT -m limit --limit 5/min -j LOG --log-prefix "IPT-DROP: " --log-level 7
# sudo ip6tables -A INPUT -m limit --limit 5/min -j LOG --log-prefix "IPT6-DROP: " --log-level 7

# ========================================================
# VIEW CURRENT RULES
# ========================================================
echo ""
echo "========================================="
echo "CURRENT IPv4 RULES:"
echo "========================================="
sudo iptables -L -n -v

echo ""
echo "========================================="
echo "CURRENT IPv6 RULES:"
echo "========================================="
sudo ip6tables -L -n -v

# ========================================================
# SAVE RULES PERSISTENTLY
# ========================================================
echo ""
echo "Saving rules persistently..."

# For Debian/Ubuntu using iptables-persistent
if command -v iptables-save &> /dev/null; then
    sudo iptables-save | sudo tee /etc/iptables/rules.v4
    sudo ip6tables-save | sudo tee /etc/iptables/rules.v6
    echo "✓ Rules saved to /etc/iptables/"
fi

# If iptables-persistent not installed
if ! command -v iptables-save &> /dev/null; then
    echo "⚠ iptables-persistent not found. Installing..."
    sudo apt-get update
    sudo apt-get install -y iptables-persistent
    sudo iptables-save | sudo tee /etc/iptables/rules.v4
    sudo ip6tables-save | sudo tee /etc/iptables/rules.v6
    echo "✓ iptables-persistent installed and rules saved"
fi

# ========================================================
# VERIFICATION
# ========================================================
echo ""
echo "========================================="
echo "✓ IPTables configuration COMPLETE!"
echo "========================================="
echo ""
echo "Summary:"
echo "  • SSH (22, 2222): Open from any IP ✓"
echo "  • HTTP (80): Only from Cloudflare IPs ✓"
echo "  • HTTPS (443): Only from Cloudflare IPs ✓"
echo "  • Direct IP/HTTPS access: BLOCKED ✓"
echo "  • Rules: Persistent (auto-load on reboot) ✓"
echo ""
echo "IMPORTANT:"
echo "  1. Your server IP direct access: BLOCKED ✓"
echo "  2. Only Cloudflare proxy can access: ✓"
echo "  3. SSH always open for management: ✓"
echo ""
echo "To view rules:"
echo "  sudo iptables -L -n -v"
echo "  sudo ip6tables -L -n -v"
echo ""
echo "To test access:"
echo "  From CF: curl https://ccvoltasein.com"
echo "  From outside CF: curl https://<YOUR_IP> (should hang/timeout)"
echo ""