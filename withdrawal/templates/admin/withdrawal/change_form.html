{% extends "admin/change_form.html" %}

{% block content %}
  {{ block.super }}

  <div class="module" style="margin-top: 2rem;">
    <h2>Process via Jayapay</h2>
    {% if not jayapay_enabled %}
      <p style="color:#b00;">Jayapay tidak aktif. Set <code>JAYAPAY_ENABLED=true</code> dan isi konfigurasi merchant.</p>
    {% endif %}

    <form method="post" action="{{ process_jayapay_url }}" novalidate>
      {% csrf_token %}
      <fieldset class="module aligned">
        <div class="form-row">
          <div>
            <label for="id_bankCode">Bank</label>
            <select id="id_bankCode" name="bankCode" required>
              <option value="">-- pilih bank --</option>
              {% for b in jayapay_banks %}
                <option value="{{ b.bankCode }}" {% if jayapay_initial.bankCode == b.bankCode %}selected{% endif %}>
                  {{ b.bankCode }} - {{ b.bankAbbreviation }} - {{ b.theNameOfTheBank }}
                </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="id_accountNumber">Account Number</label>
            <input type="text" id="id_accountNumber" name="accountNumber" value="{{ jayapay_initial.accountNumber }}" required />
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="id_accountName">Account Name</label>
            <input type="text" id="id_accountName" name="accountName" value="{{ jayapay_initial.accountName }}" required />
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="id_amount">Amount</label>
            <input type="number" step="1" id="id_amount" name="amount" value="{{ jayapay_initial.amount }}" required />
          </div>
        </div>
      </fieldset>

      <div class="submit-row">
        <button type="submit" class="default">Submit to Jayapay</button>
      </div>
    </form>
  </div>
{% endblock %}
